<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>謎解きクロスワードパズル ヒントサイト</title>
  <!-- デザインを整えるための Tailwind CSS を読み込み -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 画面切り替え・アニメーション用の設定 */
    .hidden-view { display: none !important; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    .slide-in { animation: slideIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    
    /* ボタンの共通デザイン（出っ張りと押し込み） */
    .btn-base {
      transition: transform 0.1s;
      font-weight: bold;
      border-radius: 0.5rem;
      border-width: 2px;
      border-bottom-width: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .btn-base:active {
      transform: translateY(2px); /* 押したときに沈み込む（うみょん防止） */
    }
    
    /* ボタンのカラーバリエーション */
    .btn-primary { background-color: white; border-color: #9ca3af; color: #4b5563; }
    .btn-primary:hover { background-color: #f9fafb; }
    .btn-red { background-color: #fef2f2; border-color: #fca5a5; color: #b91c1c; }
    .btn-red:hover { background-color: #fee2e2; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-gray-200 via-gray-300 to-gray-400 font-sans text-gray-800 pb-10">

<div class="max-w-md mx-auto pt-8 px-4 relative min-h-screen flex flex-col">
  <!-- メインコンテンツ領域 -->
  <div class="flex-grow relative">
    
    <!-- 1. ホーム画面 -->
    <div id="view-home" class="view-section fade-in">
      <div class="text-center mb-6">
        <p class="text-xs text-gray-600 mb-1 tracking-widest">2026 UNL:OCK群青寄稿記事</p>
        <h1 class="text-2xl font-bold text-gray-800 leading-tight mb-4">
          謎解きクロスワードパズル<br />
          <span class="text-3xl">ヒントサイト</span>
        </h1>
        <div class="bg-white/60 p-4 rounded-xl text-sm text-gray-700 shadow-sm backdrop-blur-sm mx-4 text-center leading-relaxed">
          <p class="mb-2">「画像」ボタンを押すと、謎の拡大画像を閲覧できます。</p>
          <p class="mb-4">「ヒント」ボタンを押すと、その謎のヒントを閲覧できます。</p>
          <hr class="border-gray-300 my-2 opacity-50"/>
          <p class="text-xs text-gray-600 mt-2">
            ナゾの周囲には、その問題の解き方や答えに関わるイラストが描かれています。<br>
            イラストを見ないと解けない問題はありませんが、手がかりにしてみてください。
          </p>
        </div>
      </div>

      <div class="bg-white/80 rounded-xl shadow-lg overflow-hidden backdrop-blur-sm mx-2 mb-8">
        <div class="grid grid-cols-10 bg-gray-200 p-3 text-sm font-bold text-gray-600 text-center items-center border-b border-gray-300">
          <div class="col-span-4 text-center">問題番号</div>
          <div class="col-span-3">画像</div>
          <div class="col-span-3">ヒント</div>
        </div>
        <!-- 通常問題リストがJavaScriptでここに入ります -->
        <div id="home-problem-list" class="divide-y divide-gray-200"></div>
      </div>

      <div class="px-4 pb-12">
        <button onclick="openMissingMenu()" class="btn-base btn-red w-full py-4 text-lg">
          足りない問題がある
        </button>
      </div>
    </div>

    <!-- 2. 画像詳細画面 -->
    <div id="view-image" class="view-section slide-in hidden-view absolute top-0 left-0 w-full">
      <div class="bg-white/90 rounded-2xl shadow-xl p-6 min-h-[60vh] flex flex-col items-center">
        <h2 id="image-title" class="text-3xl font-bold text-gray-800 mb-6 font-mono border-b-4 border-blue-200 w-full text-center pb-2">
          <!-- タイトル -->
        </h2>
        
        <div class="flex-grow flex flex-col items-center justify-center w-full mb-6">
          <div id="image-container" class="w-full aspect-square bg-gray-100 rounded-xl border-2 border-dashed border-gray-300 flex items-center justify-center relative overflow-hidden">
            <!-- JavaScriptでここに画像が挿入されます -->
          </div>
        </div>

        <button id="image-back-btn" class="mt-auto flex items-center gap-2 text-gray-500 hover:text-gray-800 transition-colors py-4 px-8">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          一覧に戻る
        </button>
      </div>
    </div>

    <!-- 3. ヒント詳細画面 (通常・シークレット・その他共用) -->
    <div id="view-hint" class="view-section slide-in hidden-view absolute top-0 left-0 w-full">
      <div class="bg-white/90 rounded-2xl shadow-xl p-6 min-h-[60vh] flex flex-col">
        <h2 id="hint-title" class="text-xl sm:text-3xl font-bold text-gray-800 mb-2 font-mono border-b-4 border-orange-200 w-full text-center pb-2 whitespace-pre-wrap">
          <!-- タイトル -->
        </h2>
        
        <div id="hint-container" class="flex-grow space-y-6 py-4">
          <!-- ヒントがJavaScriptでここに入ります -->
        </div>

        <div id="hint-more-wrapper" class="pt-4 flex justify-center pb-4">
          <button id="more-hints-btn" onclick="showMoreHints()" class="btn-base btn-primary w-full py-4 text-base">
            もっと見る
          </button>
        </div>
        <div id="hint-nomore-text" class="text-center py-4 text-gray-400 text-sm hidden-view">
          ヒントは以上です
        </div>

        <button id="hint-back-btn" class="mt-auto mx-auto flex items-center gap-2 text-gray-500 hover:text-gray-800 transition-colors py-4 px-8">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          一覧に戻る
        </button>
      </div>
    </div>

    <!-- 4. 足りない問題メニュー画面 -->
    <div id="view-missing" class="view-section slide-in hidden-view absolute top-0 left-0 w-full">
      <div class="bg-white/90 rounded-2xl shadow-xl p-6 min-h-[60vh] flex flex-col items-center text-center">
        <h2 class="text-xl font-bold text-red-600 mb-6 border-b-4 border-red-200 w-full pb-2">
          足りない問題がある
        </h2>
        
        <div class="flex-grow flex flex-col items-center justify-center w-full">
          <div class="space-y-4 w-full">
            <button onclick="openInstructionHint()" class="btn-base btn-primary w-full py-4 text-sm">
              指示が分からない
            </button>
            <button onclick="openNotFoundHint()" class="btn-base btn-primary w-full py-4 text-sm">
              指示に従ったが、<br/>新しい問題が見当たらない
            </button>
            <button onclick="openSecretList()" class="btn-base btn-primary w-full py-4 text-sm">
              現れた問題のヒントを見る
            </button>
          </div>
        </div>

        <button onclick="showView(viewHome)" class="mt-auto flex items-center gap-2 text-gray-500 hover:text-gray-800 transition-colors py-4 px-8">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          一覧に戻る
        </button>
      </div>
    </div>

    <!-- 5. シークレットリスト画面 -->
    <div id="view-secret-list" class="view-section slide-in hidden-view absolute top-0 left-0 w-full">
      <div class="bg-white/90 rounded-2xl shadow-xl p-6 min-h-[60vh] flex flex-col items-center">
        <h2 class="text-xl font-bold text-red-600 mb-6 border-b-4 border-red-200 w-full pb-2 text-center">
          シークレット問題
        </h2>
        
        <div class="w-full bg-white/80 rounded-xl shadow-inner overflow-hidden backdrop-blur-sm mb-8 border border-gray-200">
          <div class="grid grid-cols-10 bg-gray-200 p-3 text-sm font-bold text-gray-600 text-center items-center border-b border-gray-300">
            <div class="col-span-4 text-center">問題番号</div>
            <div class="col-span-3">画像</div>
            <div class="col-span-3">ヒント</div>
          </div>
          <!-- シークレット問題リストがJavaScriptでここに入ります -->
          <div id="secret-problem-list" class="divide-y divide-gray-200"></div>
        </div>

        <button onclick="showView(viewMissing)" class="mt-auto flex items-center gap-2 text-gray-500 hover:text-gray-800 transition-colors py-4 px-8">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          選択肢に戻る
        </button>
      </div>
    </div>

  </div>

  <!-- フッターを削除しました -->
</div>

<!-- ここから下はJavaScript（動きの制御） -->
<script>
  // --- 1. データの定義 ---
  const problems = [
    { id: 'yoko1', label: 'ヨコ1', imageSrc: '' },
    { id: 'tate5', label: 'タテ5', imageSrc: '' },
    { id: 'yoko2', label: 'ヨコ2', imageSrc: '' },
    { id: 'tate1', label: 'タテ1', imageSrc: '' },
    { id: 'tate3', label: 'タテ3', imageSrc: '' },
    { id: 'yoko7', label: 'ヨコ7', imageSrc: '' },
    { id: 'yoko6', label: 'ヨコ6', imageSrc: '' },
    { id: 'yoko4', label: 'ヨコ4', imageSrc: '' },
    { id: 'tate4', label: 'タテ4', imageSrc: '' }
  ];

  const secretProblems = [
    { id: 'yoko10', label: 'ヨコ10', imageSrc: '' },
    { id: 'tate9', label: 'タテ9', imageSrc: '' },
    { id: 'yoko3', label: 'ヨコ3', imageSrc: '' }
  ];

  const hintsData = {
    // どれにも当てはまらない問題用のヒント（念のため）
    default: [
      "まずは問題文をよく読んでみましょう。",
      "文字数に注目してください。",
      "意外な読み方をするかもしれません。",
      "これが最後のヒントです。答えは..."
    ],
    
    // ★ここを実際の問題に合わせて書き換えます。問題IDに対して、ヒントを [ ] で囲んで書きます。
    yoko1: [
      "上のイラストは太陽、下のイラストは土を表しています。<br>太陽と土の間にあるものを考え、1文字ずつ当てはめてみましょう。",
      "太陽、5つのもの、土、あわせて7つのものが１セットです。",
      "これらは曜日を表しているようです。<br>曜日を順に四角の中に入れて、✕に当てはまる文字を考えましょう。",
      "それぞれの四角には「げつかすいもくきん」が入ります。黒い枠には「かすい」が入り、並び替えるとすいかとなります。<br>答えは「きき」です。"
    ],
    tate5: [
      "黒い直線が壁を表しています。",
      "よく見ると「タテ」という文字の下部分も黒色の直線のようです。",
      "SからGまで進み、通った文字を読むと「こたえはろくが」となります。<br>答えは「ろくが(録画)」です。"
    ],
    yoko2: [
      "漢字をひらがなに直して考えてみましょう。",
      "50音表での位置関係を考えてみましょう。また、「坂」と「服」についている濁点の位置にも注目しましょう。",
      "50音表で、「おと」の3つ前を見ると「いち」となり、「ざか」の1つ後を見ると「じき」となり、「ふぐ」の2つ後を見ると「ほご」となります。<br>答えは50音で「ぎり」の1つ前になる「がら(柄)」です。"
    ],
    tate1: [
      "沢山の線が描かれているようですが、一部が図形によって隠れてしまっているようです。<br>図形によって隠されている部分がどのようになっているのか考えてみましょう。",
      "図形の下の直線を文字に見立ててみましょう。",
      "五角形の下には「ク」が、六角形の下には「キ」が、正方形の下には「カ」が隠れているようです。三角形の下には「゛(濁点)」が隠れています。答えは「きかがく(幾何学)」です。"
    ],
    tate3: [
      "白い部分に注目してみましょう。",
      "白い部分がカタカナの形になっているようです。",
      "答えは「モザイク」です。"
    ],
    yoko7: [
      "「入る文字は一意である」という言葉は少し違和感があります。",
      "問題文をよく読むと、「〇に入る文字は『いちい』である」と読み取れます。〇に「いちい」を入れてみましょう。",
      "それぞれの〇には「い」「ち」「い」が入ります。答えは、「いろちがい(色違い)」です。"
    ],
    yoko6: [
      "右側の枠は、何らかの表を表しています。",
      "右側の枠は50音表のた行からや行を表しています。数字や記号に当てはまる文字を考えてみましょう。",
      "50音表と照らし合わせると、左側には「も＝はな」「の＝め」「へ＝まゆor??」と書かれているようです。これらの組み合わせが何を表しているか考えてみましょう。",
      "これらは「へのへのもへじ」で描かれる顔のパーツと文字の対応を表しています。「へ」は眉と口を表すので、答えは「くち(口)」です。"
    ],
    yoko4: [
      "53が「はと」、94キが「どうき」、12コが「かいこ」となるようです。数字と文字の対応を考えてみましょう。",
      "「かいとうはちょうどにもじ」という文をよく見てみましょう。",
      "それぞれの数字は、「かいとうはちょうどにもじ」という文の何文字目かを表しています。解答は文の6番目と1番目の文字から「ちか(地下)」となります。"
    ],
    tate4: [
      "3つのイラストは、「子供」「肺」「芋」を表しています。",
      "イラストに対応する記号と、9マスの図を見比べてみましょう。",
      "記号は、9マスの図の枠を表しています。また、よく見ると「子供」に対応する記号の1文字目はカタカナのコになっています。答えは「チチ(父)」です。"
    ],

    // シークレット問題用ヒント
    yoko10: [
      "ヨコ10のヒント1です。", 
      "ヨコ10のヒント2です。",
      "ヨコ10のヒント3です。"
    ],
    tate9: [
      "タテ9のヒント1です。", 
      "タテ9のヒント2です。",
      "タテ9のヒント3です。"
    ],
    yoko3: [
      "ヨコ3のヒント1です。", 
      "ヨコ3のヒント2です。",
      "ヨコ3のヒント3です。"
    ]
  };

  const secretInstructionHints = [
    "最後の答えが出たら、その言葉が指し示す場所を探してみましょう。",
    "記事の中に隠されたQRコードやURLはありませんか？",
    "あるいは、特定の文字を繋げるとメッセージになりませんか？"
  ];

  const secretNotFoundHints = [
    "指示された場所をもう一度よく見てください。",
    "スマートフォンの画面の明るさを上げてみると、薄く書かれた文字が見えるかもしれません。",
    "ページのソースコードを見る必要はないので、表示されている画像の変化に注目してください。"
  ];


  // --- 2. 画面の切り替え機能 ---
  const viewHome = document.getElementById('view-home');
  const viewImage = document.getElementById('view-image');
  const viewHint = document.getElementById('view-hint');
  const viewMissing = document.getElementById('view-missing');
  const viewSecretList = document.getElementById('view-secret-list');
  const allViews = [viewHome, viewImage, viewHint, viewMissing, viewSecretList];

  function showView(targetView) {
    // 全ての画面を隠す
    allViews.forEach(view => view.classList.add('hidden-view'));
    // 対象の画面だけ表示
    targetView.classList.remove('hidden-view');
    // アニメーションをやり直すための処理
    targetView.classList.remove('fade-in', 'slide-in');
    void targetView.offsetWidth; 
    targetView.classList.add(targetView === viewHome ? 'fade-in' : 'slide-in');
    
    // スクロールを一番上に戻す
    window.scrollTo(0, 0);
  }


  // --- 3. 一覧表の作成（HTMLに差し込み） ---
  function renderList(containerId, list, isSecret) {
    const container = document.getElementById(containerId);
    let html = '';
    list.forEach(p => {
      html += `
        <div class="grid grid-cols-10 p-3 items-center gap-3 hover:bg-gray-50 transition-colors">
          <div class="col-span-4 font-bold text-gray-800 font-mono text-base text-center">${p.label}</div>
          <div class="col-span-3">
            <button onclick="openImage('${p.id}', ${isSecret})" class="btn-base btn-primary w-full h-10 text-sm">画像</button>
          </div>
          <div class="col-span-3">
            <button onclick="openHint('${p.id}', ${isSecret})" class="btn-base btn-primary w-full h-10 text-sm">ヒント</button>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
  }
  
  // 読み込み時に一覧表を作成
  renderList('home-problem-list', problems, false);
  renderList('secret-problem-list', secretProblems, true);


  // --- 4. 画像画面の処理 ---
  function openImage(problemId, isSecret) {
    const list = isSecret ? secretProblems : problems;
    const problem = list.find(p => p.id === problemId);
    
    document.getElementById('image-title').textContent = problem.label;
    document.getElementById('image-back-btn').onclick = () => showView(isSecret ? viewSecretList : viewHome);
    
    // 画像の表示処理
    const imageContainer = document.getElementById('image-container');
    if (problem.imageSrc) {
      // 画像パスが設定されている場合は画像を表示
      imageContainer.innerHTML = `<img src="${problem.imageSrc}" alt="${problem.label}の画像" class="w-full h-full object-contain p-2">`;
    } else {
      // 設定されていない場合はプレースホルダー（仮のアイコン）を表示
      imageContainer.innerHTML = `
        <div class="text-center p-4">
          <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-300 mx-auto mb-2"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
          <p class="text-gray-400 font-bold">謎の画像</p>
          <p class="text-xs text-gray-400 mt-1">※ここに問題の画像が表示されます</p>
        </div>
      `;
    }
    
    showView(viewImage);
  }


  // --- 5. ヒント画面の処理 ---
  let currentHints = [];
  let visibleHintCount = 1;

  // 通常・シークレット問題のヒントを開く
  function openHint(problemId, isSecret) {
    const list = isSecret ? secretProblems : problems;
    const problem = list.find(p => p.id === problemId);
    const hints = hintsData[problem.id] || hintsData.default;
    setupHintPage(problem.label, hints, () => showView(isSecret ? viewSecretList : viewHome));
  }

  // 指示が分からない のヒントを開く
  function openInstructionHint() {
    setupHintPage("指示が分からない", secretInstructionHints, () => showView(viewMissing));
  }

  // 見当たらない のヒントを開く
  function openNotFoundHint() {
    setupHintPage("指示に従ったが、\n新しい問題が見当たらない", secretNotFoundHints, () => showView(viewMissing));
  }

  // ヒント画面のセットアップ
  function setupHintPage(title, hintsArray, backAction) {
    document.getElementById('hint-title').textContent = title;
    currentHints = hintsArray;
    visibleHintCount = 1; // 最初は1つだけ表示
    document.getElementById('hint-back-btn').onclick = backAction;
    
    renderHints();
    showView(viewHint);
  }

  // ヒントを画面に描画
  function renderHints() {
    const container = document.getElementById('hint-container');
    const hintsToShow = currentHints.slice(0, visibleHintCount);
    
    let html = '';
    hintsToShow.forEach((hint, index) => {
      // ★最後の項目（答えと解説）かどうかの判定を追加
      const isLastItem = index === currentHints.length - 1;
      const labelText = isLastItem ? "答えと解説" : `ヒント ${index + 1}/${currentHints.length - 1}`;
      const badgeClass = isLastItem ? "bg-red-100 text-red-700" : "bg-orange-100 text-orange-700";

      html += `
        <div class="fade-in mb-6">
          <div class="flex items-center gap-2 mb-2">
            <span class="${badgeClass} text-xs font-bold px-2 py-1 rounded">
              ${labelText}
            </span>
          </div>
          <div class="bg-orange-50 border-l-4 border-orange-400 p-4 rounded-r-lg text-gray-800 leading-relaxed font-medium">
            ${hint}
          </div>
        </div>
      `;
    });
    container.innerHTML = html;

    // 「もっと見る」ボタンの表示切り替え
    const moreBtnWrapper = document.getElementById('hint-more-wrapper');
    const moreBtn = document.getElementById('more-hints-btn');
    const noMoreText = document.getElementById('hint-nomore-text');
    
    if (visibleHintCount < currentHints.length) {
      moreBtnWrapper.classList.remove('hidden-view');
      noMoreText.classList.add('hidden-view');
      
      // ★次が最後のヒント（＝今が最後から2番目）の場合、ボタンの文字を変える
      if (visibleHintCount === currentHints.length - 1) {
        moreBtn.textContent = "答えと解説を見る";
      } else {
        moreBtn.textContent = "もっと見る"; 
      }

    } else {
      moreBtnWrapper.classList.add('hidden-view');
      noMoreText.classList.remove('hidden-view');
    }
  }

  // 「もっと見る」ボタンが押されたとき
  function showMoreHints() {
    if (visibleHintCount < currentHints.length) {
      visibleHintCount++;
      renderHints();
    }
  }


  // --- 6. 足りない問題メニューの処理 ---
  function openMissingMenu() {
    showView(viewMissing);
  }

  function openSecretList() {
    showView(viewSecretList);
  }

</script>
</body>
</html>
